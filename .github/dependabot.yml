version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 5
    groups:
      ruby-deps:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    # Each entry is a standalone cargo workspace with its own Cargo.lock;
    # the root workspace excludes crates/ and wasm/, so they must be
    # listed explicitly for their manifests to be updatable.
    directories:
      - "/"
      - "/crates"
      - "/wasm"
      - "/wasm/kobako-baker"
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 5
    groups:
      rust-deps:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      gha-deps:
        update-types:
          - minor
          - patch
