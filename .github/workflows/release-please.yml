name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      core_release_created: ${{ steps.release.outputs['wasm/kobako-core--release_created'] }}
      rs_release_created: ${{ steps.release.outputs['wasm/kobako--release_created'] }}
      io_release_created: ${{ steps.release.outputs['wasm/kobako-io--release_created'] }}
      json_release_created: ${{ steps.release.outputs['wasm/kobako-json--release_created'] }}
      regexp_release_created: ${{ steps.release.outputs['wasm/kobako-regexp--release_created'] }}
      baker_release_created: ${{ steps.release.outputs['wasm/kobako-baker--release_created'] }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release

  # release-please creates the GitHub Release with the default GITHUB_TOKEN,
  # and Actions does not re-trigger workflows from GITHUB_TOKEN-authored
  # events. So `release.yml`'s `on: release` never fires on a release-please
  # tag; chain it explicitly as a reusable workflow instead.
  release-gem:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}

  # The crate release chains the same way, keyed on the per-path outputs
  # of the crate packages (the root gem keeps the unprefixed outputs).
  # The linked-versions group releases the five crates together; the OR
  # keeps the chain alive if one output ever drops.
  release-crate:
    needs: release-please
    if: ${{ needs.release-please.outputs.core_release_created || needs.release-please.outputs.rs_release_created || needs.release-please.outputs.io_release_created || needs.release-please.outputs.json_release_created || needs.release-please.outputs.regexp_release_created || needs.release-please.outputs.baker_release_created }}
    uses: ./.github/workflows/release-crate.yml
    secrets: inherit

  sync-lockfiles:
    needs: release-please
    if: ${{ needs.release-please.outputs.pr }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version: '3.4'
          bundler-cache: false
      # Regenerate Cargo.lock with the pinned toolchain, not floating stable,
      # so the lockfile matches what the rest of CI builds with.
      - name: Set up Rust toolchain
        uses: ./.github/actions/setup-rust
      - name: Regenerate Gemfile.lock
        run: bundle install
      - name: Regenerate Cargo.lock kobako and host crate entries
        run: cargo update -p kobako -p kobako-runtime -p kobako-wasmtime --workspace --offline || cargo update -p kobako -p kobako-runtime -p kobako-wasmtime
      - name: Regenerate wasm/Cargo.lock guest crate entries
        working-directory: wasm
        run: cargo update -p kobako-core -p kobako -p kobako-io -p kobako-json -p kobako-regexp --workspace --offline || cargo update -p kobako-core -p kobako -p kobako-io -p kobako-json -p kobako-regexp
      - name: Regenerate wasm/kobako-baker/Cargo.lock entry
        working-directory: wasm/kobako-baker
        run: cargo update -p kobako-baker --offline || cargo update -p kobako-baker
      - name: Regenerate crates/Cargo.lock host crate entries
        working-directory: crates
        run: cargo update -p kobako-runtime -p kobako-wasmtime --workspace --offline || cargo update -p kobako-runtime -p kobako-wasmtime
      - name: Commit lockfile updates as a verified commit
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BRANCH_NAME: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
        with:
          script: |
            const syncLockfiles = require('./.github/scripts/sync-lockfiles.js');
            await syncLockfiles({ github, context, core });
