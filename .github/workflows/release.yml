name: Release

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push built gems to RubyGems'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      push:
        description: 'Push built gems to RubyGems'
        required: false
        default: true
        type: boolean
  release:
    types:
      - released

env:
  RUBY_VERSION: '3.4'
  # Precompiled native gem ABI coverage. Mirrors `.github/workflows/main.yml`.
  RUBY_VERSIONS: '3.3,3.4,4.0'

permissions:
  contents: read
  id-token: write

jobs:
  ci-data:
    name: Resolve native platforms
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - uses: oxidize-rb/actions/fetch-ci-data@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1
        id: fetch
        with:
          # arm-linux is 32-bit ARM; wasmtime's Cranelift backend does not
          # ship a 32-bit ARM target, so this platform cannot link.
          # aarch64-mingw-ucrt is not present in rb-sys-dock images yet.
          # x64-mingw32 is the legacy Windows MinGW ABI for Ruby <= 3.0;
          # rake-compiler-dock 1.12.0 has no rbconfig for Ruby 3.3/3.4/4.0
          # on this target. Modern Windows Ruby uses x64-mingw-ucrt instead,
          # and kobako requires Ruby >= 3.3.
          supported-ruby-platforms: |
            exclude: [arm-linux, aarch64-mingw-ucrt, x64-mingw32]

  build-wasm:
    name: Build kobako.wasm (platform-agnostic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
      # dtolnay/rust-toolchain does not read rust-toolchain.toml, so source
      # the channel from it here to keep a single version of truth.
      - name: Read Rust channel from rust-toolchain.toml
        id: rust
        run: echo "channel=$(grep '^channel' rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: wasm/kobako-wasm
      - name: Build Guest Binary (chains vendor:setup + mruby:build + wasm:build)
        run: bundle exec rake wasm:build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kobako-wasm
          path: data/kobako.wasm
          retention-days: 7
          if-no-files-found: error

  plain-gem:
    name: Build plain gem
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: kobako-wasm
          path: data/
      - name: Build plain gem
        run: |
          gem build kobako.gemspec
          mkdir -p pkg
          mv kobako-*.gem pkg/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plain-gem
          path: pkg/*.gem
          if-no-files-found: error

  native-gem:
    name: Native gem for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: [ci-data, build-wasm]
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.ci-data.outputs.result).supported-ruby-platforms }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: kobako-wasm
          path: data/
      - uses: oxidize-rb/actions/cross-gem@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: ${{ env.RUBY_VERSIONS }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-gem-${{ matrix.platform }}
          path: ${{ steps.cross-gem.outputs.gem-path }}
          if-no-files-found: error

  publish:
    name: Publish gems to RubyGems
    runs-on: ubuntu-latest
    needs: [plain-gem, native-gem]
    if: github.event_name == 'release' || inputs.push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: '*-gem*'
          merge-multiple: true
          path: pkg/
      - name: List built gems
        run: ls -la pkg/
      - uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0
      - name: Push all gems
        run: |
          for gem in pkg/*.gem; do
            echo "Pushing $gem"
            gem push "$gem"
          done
