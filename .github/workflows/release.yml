name: Release

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push built gems to RubyGems'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      push:
        description: 'Push built gems to RubyGems'
        required: false
        default: true
        type: boolean
      tag:
        description: 'Release tag to attach built artifacts to (set by the release-please chain)'
        required: false
        default: ''
        type: string
  release:
    types:
      - released

env:
  RUBY_VERSION: '3.4'
  # Precompiled native gem ABI coverage. Mirrors `.github/workflows/main.yml`.
  RUBY_VERSIONS: '3.3,3.4,4.0'

permissions:
  contents: read
  id-token: write

jobs:
  ci-data:
    name: Resolve native platforms
    # Gem-family releases only: fire on a gem tag (`v*`), never on a crate
    # tag (`kobako-*-v*`, published by `release-crate.yml`). The guard
    # cascades to every other job via `needs`.
    if: ${{ github.event_name != 'release' || startsWith(github.event.release.tag_name, 'v') }}
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fetch.outputs.result }}
    steps:
      - uses: oxidize-rb/actions/fetch-ci-data@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1
        id: fetch
        with:
          # arm-linux is 32-bit ARM; wasmtime's Cranelift backend does not
          # ship a 32-bit ARM target, so this platform cannot link.
          # aarch64-mingw-ucrt is not present in rb-sys-dock images yet.
          # x64-mingw32 is the legacy Windows MinGW ABI for Ruby <= 3.0;
          # rake-compiler-dock 1.12.0 has no rbconfig for Ruby 3.3/3.4/4.0
          # on this target. Modern Windows Ruby uses x64-mingw-ucrt instead,
          # and kobako requires Ruby >= 3.3.
          supported-ruby-platforms: |
            exclude: [arm-linux, aarch64-mingw-ucrt, x64-mingw32]

  build-wasm:
    name: Build kobako.wasm (platform-agnostic)
    if: ${{ github.event_name != 'release' || startsWith(github.event.release.tag_name, 'v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
      - name: Set up Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: wasm/kobako-wasm
      - name: Build Guest Binary variants (pure default + regexp variants)
        run: bundle exec rake wasm:build wasm:build:regexp wasm:build:regexp_unicode
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kobako-wasm
          path: |
            data/kobako.wasm
            data/kobako+regexp.wasm
            data/kobako+regexp-unicode.wasm
          retention-days: 7
          if-no-files-found: error

  plain-gem:
    name: Build plain gem
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: kobako-wasm
          path: data/
      - name: Build plain gem
        run: |
          gem build kobako.gemspec
          mkdir -p pkg
          mv kobako-*.gem pkg/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plain-gem
          path: pkg/*.gem
          if-no-files-found: error

  native-gem:
    name: Native gem for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: [ci-data, build-wasm]
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.ci-data.outputs.result).supported-ruby-platforms }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: kobako-wasm
          path: data/
      # The pinned channel only matters for the wasm32-wasip1 guest's wasi-sdk
      # lockstep (build-wasm); the host ext built here has no such tie. The file
      # ships in the gem, so retarget its channel (don't delete it — that breaks
      # the cross task's copy step) to rb-sys-dock's default `stable` toolchain,
      # which already carries this platform's cross-target std.
      - name: Build the host ext with the container's stable toolchain
        run: sed -i 's/^channel = .*/channel = "stable"/' rust-toolchain.toml
      - uses: oxidize-rb/actions/cross-gem@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: ${{ env.RUBY_VERSIONS }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-gem-${{ matrix.platform }}
          path: ${{ steps.cross-gem.outputs.gem-path }}
          if-no-files-found: error

  publish:
    name: Publish gems to RubyGems
    runs-on: ubuntu-latest
    needs: [plain-gem, native-gem]
    if: github.event_name == 'release' || inputs.push
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: '*-gem*'
          merge-multiple: true
          path: pkg/
      - name: List built gems
        run: ls -la pkg/
      - uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0
      - name: Push all gems
        run: |
          for gem in pkg/*.gem; do
            echo "Pushing $gem"
            gem push "$gem"
          done

  release-assets:
    name: Attach release assets
    runs-on: ubuntu-latest
    needs: publish
    # Only when an actual GitHub Release drives the run: the release
    # event carries its tag, and the release-please chain passes it via
    # `inputs.tag`. A bare workflow_dispatch builds from the branch
    # head, so attaching its artifacts to an older release would lie.
    if: ${{ github.event_name == 'release' || inputs.tag != '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: kobako-wasm
          path: data/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: '*-gem*'
          merge-multiple: true
          path: pkg/
      - name: Attach the Guest Binary variants and gem backups to the release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: .github/scripts/upload-release-assets.sh
