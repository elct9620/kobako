name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.3'
          - '3.4'
          - '4.0'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1.307.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          rubygems: '3.6.9'
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
          targets: wasm32-wasip1
      - name: Cache cargo
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: |
            .
            wasm/kobako-wasm
      - name: Run the default task
        run: bundle exec rake
      - name: Rust unit tests (kobako-wasm, host target)
        run: bundle exec rake wasm:test
      - name: cargo fmt --check (ext + wasm crate)
        run: |
          cargo fmt --manifest-path ext/kobako/Cargo.toml -- --check
          cargo fmt --manifest-path wasm/kobako-wasm/Cargo.toml -- --check
      - name: cargo clippy (ext, host target)
        run: cargo clippy --manifest-path ext/kobako/Cargo.toml -- -D warnings
      - name: cargo clippy (kobako-wasm, wasm32-wasip1)
        run: cargo clippy --manifest-path wasm/kobako-wasm/Cargo.toml --target wasm32-wasip1 -- -D warnings
