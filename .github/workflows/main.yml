name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.3'
          - '3.4'
          - '4.0'

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          rubygems: '3.6.9'
      - name: Set up Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip1
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            crates
            wasm/kobako-wasm
      - name: Run the default task
        run: bundle exec rake
      - name: Rust unit tests (kobako-wasm, host target)
        run: bundle exec rake wasm:test
      - name: Rust unit tests (crates/ host workspace)
        run: bundle exec rake crates:test
      - name: cargo fmt --check (ext + crates + wasm crate)
        run: |
          cargo fmt --manifest-path ext/kobako/Cargo.toml -- --check
          cargo fmt --manifest-path crates/Cargo.toml --all -- --check
          cargo fmt --manifest-path wasm/kobako-wasm/Cargo.toml -- --check
      - name: cargo clippy (ext, host target)
        run: cargo clippy --manifest-path ext/kobako/Cargo.toml -- -D warnings
      - name: cargo clippy (crates/, host workspace)
        run: cargo clippy --manifest-path crates/Cargo.toml --workspace --all-targets -- -D warnings
      - name: cargo clippy (kobako-wasm, wasm32-wasip1)
        # beni-sys requires the Stage B archive paths explicitly on
        # cross targets; "Run the default task" above built them.
        env:
          MRUBY_LIB_DIR: ${{ github.workspace }}/vendor/mruby/build/wasi/lib
          WASI_SDK_PATH: ${{ github.workspace }}/vendor/wasi-sdk
        run: cargo clippy --manifest-path wasm/kobako-wasm/Cargo.toml --target wasm32-wasip1 -- -D warnings
