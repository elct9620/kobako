name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.3'
          - '3.4'
          - '4.0'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          rubygems: '3.6.9'
      # dtolnay/rust-toolchain does not read rust-toolchain.toml, so source
      # the channel from it here to keep a single version of truth.
      - name: Read Rust channel from rust-toolchain.toml
        id: rust
        run: echo "channel=$(grep '^channel' rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
          components: clippy, rustfmt
          targets: wasm32-wasip1
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            wasm/kobako-wasm
      - name: Run the default task
        run: bundle exec rake
      - name: Rust unit tests (kobako-wasm, host target)
        run: bundle exec rake wasm:test
      - name: cargo fmt --check (ext + wasm crate)
        run: |
          cargo fmt --manifest-path ext/kobako/Cargo.toml -- --check
          cargo fmt --manifest-path wasm/kobako-wasm/Cargo.toml -- --check
      - name: cargo clippy (ext, host target)
        run: cargo clippy --manifest-path ext/kobako/Cargo.toml -- -D warnings
      - name: cargo clippy (kobako-wasm, wasm32-wasip1)
        run: cargo clippy --manifest-path wasm/kobako-wasm/Cargo.toml --target wasm32-wasip1 -- -D warnings
