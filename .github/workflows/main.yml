name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.3'
          - '3.4'
          - '4.0'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          rubygems: '3.6.9'
      - name: Set up Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip1
      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            wasm/kobako-wasm
      - name: Run the default task
        run: bundle exec rake
      - name: Release-tooling unit tests (anchor checker + bench gate)
        run: .github/scripts/report-tooling-tests.sh
      - name: Rust unit tests (kobako-wasm, host target)
        run: bundle exec rake wasm:test
      - name: cargo fmt --check (ext + wasm crate)
        run: |
          cargo fmt --manifest-path ext/kobako/Cargo.toml -- --check
          cargo fmt --manifest-path wasm/kobako-wasm/Cargo.toml -- --check
      - name: cargo clippy (ext, host target)
        run: cargo clippy --manifest-path ext/kobako/Cargo.toml -- -D warnings
      - name: cargo clippy (kobako-wasm, wasm32-wasip1)
        # beni-sys requires the Stage B archive paths explicitly on
        # cross targets; "Run the default task" above built them.
        env:
          MRUBY_LIB_DIR: ${{ github.workspace }}/vendor/mruby/build/wasi/lib
          WASI_SDK_PATH: ${{ github.workspace }}/vendor/wasi-sdk
        run: cargo clippy --manifest-path wasm/kobako-wasm/Cargo.toml --target wasm32-wasip1 -- -D warnings
