name: Release Crate

# Publishes the guest crates (`kobako-core`, `kobako-io`,
# `kobako-regexp`, `kobako`) from the `wasm/` sub-workspace plus the
# standalone `kobako-baker` (host-side bake tool beside them) to
# crates.io. Split from
# `release.yml` by release type: that workflow ships the Ruby gem
# family, this one ships crates. The manual-recovery shape mirrors
# the gem's — `workflow_dispatch` defaults `push` to false, so a bare
# dispatch is a `cargo publish --dry-run` rehearsal; tick `push` to
# publish for real.
#
# One publish covers the whole linked group, so a `release` event must
# fire it exactly once. The job guard keys on the `kobako-core-v*` tag
# alone; the other crate tags in the same group trigger nothing.

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Publish the guest crates to crates.io'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      push:
        description: 'Publish the guest crates to crates.io'
        required: false
        default: true
        type: boolean
  release:
    types:
      - released

permissions:
  contents: read
  id-token: write

jobs:
  publish-crate:
    name: Publish guest crates to crates.io
    runs-on: ubuntu-latest
    # A `release` event publishes the whole group, so accept only the
    # representative `kobako-core-v*` tag and ignore the sibling crate tags.
    if: ${{ github.event_name != 'release' || startsWith(github.event.release.tag_name, 'kobako-core-') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Rust toolchain
        uses: ./.github/actions/setup-rust
      - name: Dry-run publish
        if: ${{ github.event_name != 'release' && !inputs.push }}
        working-directory: wasm
        run: '"$GITHUB_WORKSPACE/.github/scripts/publish-crates.sh" --dry-run'
      # Trusted Publishing: exchange the workflow's OIDC token for a
      # short-lived crates.io token (the crates.io counterpart of the
      # rubygems OIDC flow in release.yml). Requires each guest
      # crate's Trusted Publishing config on crates.io to name this
      # repository and workflow file.
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        if: ${{ github.event_name == 'release' || inputs.push }}
        id: auth
      - name: Publish to crates.io
        if: ${{ github.event_name == 'release' || inputs.push }}
        working-directory: wasm
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: '"$GITHUB_WORKSPACE/.github/scripts/publish-crates.sh"'
