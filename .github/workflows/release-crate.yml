name: Release Crate

# Publishes `kobako-core` from the `wasm/` sub-workspace to crates.io.
# Split from `release.yml` by release type: that workflow ships the Ruby
# gem family, this one ships crates. The manual-recovery shape mirrors
# the gem's — `workflow_dispatch` defaults `push` to false, so a bare
# dispatch is a `cargo publish --dry-run` rehearsal; tick `push` to
# publish for real.

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Publish kobako-core to crates.io'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      push:
        description: 'Publish kobako-core to crates.io'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish-crate:
    name: Publish kobako-core to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      # dtolnay/rust-toolchain does not read rust-toolchain.toml, so source
      # the channel from it here to keep a single version of truth.
      - name: Read Rust channel from rust-toolchain.toml
        id: rust
        run: echo "channel=$(grep '^channel' rust-toolchain.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ steps.rust.outputs.channel }}
      - name: Dry-run publish
        if: ${{ !inputs.push }}
        working-directory: wasm
        run: cargo publish -p kobako-core --dry-run
      # Trusted Publishing: exchange the workflow's OIDC token for a
      # short-lived crates.io token (the crates.io counterpart of the
      # rubygems OIDC flow in release.yml). Requires the kobako-core
      # crate's Trusted Publishing config on crates.io to name this
      # repository and workflow file.
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        if: ${{ inputs.push }}
        id: auth
      - name: Publish to crates.io
        if: ${{ inputs.push }}
        working-directory: wasm
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p kobako-core
