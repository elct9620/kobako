# kobako-wasm — Guest Binary crate.
#
# This crate compiles to `kobako.wasm` (the Guest Binary artifact) and
# houses the transport client (`crate::transport`), the ABI exports,
# and the Ruby boot bytecode pipeline. The mruby-free wire tiers
# (`codec`, `outcome`) live in the sibling `kobako-core` contract
# crate; the mruby C API FFI surface (bindgen-generated bindings + the
# `wrapper.h` static-inline shims) lives in the sibling `mruby-sys`
# crate, consumed via the `mruby` wrapper and re-exported as
# `crate::mruby::sys`.
#
# This crate is a member of the `wasm/` sub-workspace (see
# `wasm/Cargo.toml`). The repo-root `Cargo.toml` excludes the entire
# `wasm/` subtree so the wasmtime-bearing host workspace does not pull
# the wasm32-wasip1 crates into its dependency graph.

[package]
name = "kobako-wasm"
version = "0.0.0"
edition = "2021"
publish = false
description = "kobako Guest Binary — mruby-on-wasm interpreter and MessagePack codec (rmp-backed)."
license = "Apache-2.0"

[lib]
# `cdylib` produces the wasm artifact when targeting wasm32-wasip1.
# `rlib` lets us run codec unit tests on the host target.
crate-type = ["cdylib", "rlib"]

[dependencies]
# `kobako-core` — Guest ABI contract crate (sibling workspace member).
# Supplies the mruby-free wire tiers (`codec`, `outcome`); this crate
# layers the mruby implementation on top.
kobako-core = { path = "../kobako-core" }

# `mruby` — typed Rust wrapper crate over the mruby C API. Re-exports
# the underlying `mruby-sys` FFI through its `sys` namespace, so
# `crate::mruby::sys::*` resolves to the raw bindgen surface and
# typed entry points (`Mrb`, `Ccontext`, `Value`, `Class`, the
# `format::*` ZST markers, `IntoValue` / `FromValue` / `Format`
# traits, …) come through `mruby::*` directly. `mruby-sys` reaches
# the dependency graph transitively through `mruby`; no direct entry
# is needed here.
mruby = { path = "../mruby" }

# `[profile.release]` lives at the workspace root (`wasm/Cargo.toml`)
# so both members share the same wasm size hygiene tuning.
