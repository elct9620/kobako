# kobako-wasm — Guest Binary crate.
#
# This crate compiles to `kobako.wasm` (the Guest Binary artifact) and houses
# the MessagePack wire codec. Per SPEC.md "Implementation Standards", this
# crate declares itself as its own workspace root so that `cargo` does not
# collapse it into the repo-root workspace (which would force wasmtime — a
# host-only crate — into the wasm32-wasip1 dependency graph).
#
# Wire codec backbone is the `rmp` crate — the Rust counterpart of the
# msgpack-ruby gem used on the host side. This gives the guest a thin glue
# layer (Value <-> rmp encode/decode helpers) instead of a hand-rolled
# binary codec, and keeps the wire byte form aligned with the host.

[workspace]
# Empty workspace table marks this directory as a workspace root and stops
# `cargo`'s upward search for an enclosing workspace manifest.

[package]
name = "kobako-wasm"
version = "0.0.0"
edition = "2021"
publish = false
description = "kobako Guest Binary — mruby-on-wasm interpreter and MessagePack wire codec (rmp-backed)."
license = "Apache-2.0"

[lib]
# `cdylib` produces the wasm artifact when targeting wasm32-wasip1.
# `rlib` lets us run codec unit tests on the host target.
crate-type = ["cdylib", "rlib"]

[dependencies]
# `rmp` is the low-level (no-serde) Pure Rust MessagePack codec. We use it
# directly through `rmp::encode` / `rmp::decode` so the guest codec stays a
# thin shim — kobako's Value enum maps one-to-one onto rmp's primitives.
# `default-features = false` keeps the dependency footprint minimal on the
# wasm32-wasip1 target, which already pays for `std` through mruby.
rmp = { version = "0.8", default-features = false }

[build-dependencies]
# `cc` compiles the layout-safe C shim (`src/mruby/exc.c`) that exposes
# `mrb->exc` through mruby's own headers rather than Rust-side offset arithmetic.
# Only active on wasm32 (build.rs gates compilation behind target_arch check).
cc = "1"

[profile.release]
# wasm size hygiene. These are not load-bearing for the skeleton, but pin
# the intent so item #6 / #9 inherit a sensible baseline.
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
