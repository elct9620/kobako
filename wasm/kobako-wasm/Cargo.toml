# kobako-wasm — Guest Binary crate.
#
# This crate compiles to `kobako.wasm` (the Guest Binary artifact) and
# houses the MessagePack codec, the transport client (`crate::transport`),
# the ABI exports, and the Ruby boot bytecode pipeline. The mruby C API
# FFI surface (bindgen-generated bindings + the `wrapper.h` static-inline
# shims) lives in the sibling `mruby-sys` crate; `kobako-wasm`
# consumes it as a path dependency and re-exports it as `crate::mruby::sys`.
#
# This crate is a member of the `wasm/` sub-workspace (see
# `wasm/Cargo.toml`). The repo-root `Cargo.toml` excludes the entire
# `wasm/` subtree so the wasmtime-bearing host workspace does not pull
# the wasm32-wasip1 crates into its dependency graph.
#
# Codec backbone is the `rmp` crate — the Rust counterpart of the
# msgpack-ruby gem used on the host side. This gives the guest a thin glue
# layer (Value <-> rmp encode/decode helpers) instead of a hand-rolled
# binary codec, and keeps the byte form aligned with the host.

[package]
name = "kobako-wasm"
version = "0.0.0"
edition = "2021"
publish = false
description = "kobako Guest Binary — mruby-on-wasm interpreter and MessagePack codec (rmp-backed)."
license = "Apache-2.0"

[lib]
# `cdylib` produces the wasm artifact when targeting wasm32-wasip1.
# `rlib` lets us run codec unit tests on the host target.
crate-type = ["cdylib", "rlib"]

[dependencies]
# `rmp` is the low-level (no-serde) Pure Rust MessagePack codec. We use it
# directly through `rmp::encode` / `rmp::decode` so the guest codec stays a
# thin shim — kobako's Value enum maps one-to-one onto rmp's primitives.
# `default-features = false` keeps the dependency footprint minimal on the
# wasm32-wasip1 target, which already pays for `std` through mruby.
rmp = { version = "0.8", default-features = false }

# `mruby` — typed Rust wrapper crate over the mruby C API. Re-exports
# the underlying `mruby-sys` FFI through its `sys` namespace, so
# `crate::mruby::sys::*` resolves to the raw bindgen surface and
# typed entry points (`Mrb`, `Ccontext`, …) come through `mruby::*`
# directly.
mruby = { path = "../mruby" }

# `mruby-sys` — kept as a direct dependency only for the `cstr!`
# macro, which does not transit `pub use` cleanly through the
# `mruby` wrapper. The dependency disappears once the typed
# wrappers (including the macro's defining file) physically move
# into the `mruby` crate.
mruby-sys = { path = "../mruby-sys" }

# `[profile.release]` lives at the workspace root (`wasm/Cargo.toml`)
# so both members share the same wasm size hygiene tuning.
