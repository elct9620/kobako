AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false


Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# E2E test files spin up servers and orchestrate multi-step assertions; the
# default Metrics cops fight that shape without improving the tests. Each
# entry below is the specific test class that exceeds the limit today —
# new tests are expected to stay inside the cop's defaults.
Metrics/ClassLength:
  Exclude:
    - "test/test_codec_roundtrip_fuzz.rb"
    - "test/test_e2e_journeys.rb"
    - "test/test_envelope_roundtrip.rb"
    - "test/test_handle_table.rb"
    - "test/test_rpc_dispatch.rb"
    - "test/test_service_registry.rb"
    - "test/test_wire_codec.rb"
    - "test/test_wire_envelope.rb"

# Long E2E / fuzz assertion bodies set up multi-step round-trip state; the
# AbcSize budget penalises that shape without improving the tests.
Metrics/AbcSize:
  Exclude:
    - "test/test_codec_roundtrip_fuzz.rb"
    - "test/test_e2e_journeys.rb"
    - "test/test_handle_table.rb"
    - "test/test_rpc_dispatch.rb"
    - "test/test_sandbox.rb"
    - "test/test_service_registry.rb"

# Codec fuzz harness dispatches on MessagePack tag families; the cyclomatic
# shape mirrors the format spec and is intentional.
Metrics/CyclomaticComplexity:
  Exclude:
    - "test/test_codec_roundtrip_fuzz.rb"

# Codec helpers take single short-name byte/length parameters (n, s, f);
# longer names would reduce, not improve, readability.
Naming/MethodParameterName:
  Exclude:
    - "test/test_codec_roundtrip_fuzz.rb"

# MessagePack format names embed bit-width suffixes (int_8, fixarray_16, map_32)
# matching the SPEC wire-format vocabulary; renaming them to "int8" would lose
# the SPEC alignment and is rejected.
Naming/VariableNumber:
  Exclude:
    - "test/test_codec_roundtrip_fuzz.rb"
    - "test/test_wire_envelope.rb"

# Test fixtures memoise expensive build status (cargo/wasm builds) across
# per-method test instances; class instance vars don't survive `Minitest::Test`
# instantiating a fresh instance per test method, so @@class_var is required.
Style/ClassVars:
  Exclude:
    - "test/test_codec_roundtrip_fuzz.rb"
    - "test/test_envelope_roundtrip.rb"

# Rake `namespace` blocks group N child task declarations; their size is
# the sum of the task DSL inside, so any namespace with 3+ tasks naturally
# exceeds the default 25-line budget. Confined to .rake files so the cop
# still applies to pure Ruby under tasks/support/.
Metrics/BlockLength:
  Exclude:
    - "tasks/*.rake"
    - "*.gemspec"

# Long line is a binary-format alignment comment (hex bytes laid out under
# their semantic meaning); breaking the line would destroy the diagram.
Layout/LineLength:
  Exclude:
    - "test/test_wire_envelope.rb"
    - "test/test_abi_wasm_invariant.rb"
    - "*.gemspec"

# These two test files host a primary test class plus a small E2E sibling
# class guarded by an env var; splitting them would obscure the shared
# scaffolding.
Style/OneClassPerFile:
  Exclude:
    - "test/test_registry_internals.rb"
    - "test/test_sandbox_errors.rb"

# test_codec_roundtrip_fuzz.rb defines data-table constants (bands, samplers,
# coverage keys) directly in the class body under a top-level `private` keyword.
# The `private` modifier is a no-op for constants in Ruby (the cop is correct),
# but the co-location with the private methods that consume them is intentional.
Lint/UselessConstantScoping:
  Exclude:
    - "test/test_codec_roundtrip_fuzz.rb"

# Platform-detection branches intentionally collapse to identical defaults
# (e.g. "x86_64-linux") for unrecognised host triples; the duplication keeps
# the case-statement parallel and easy to extend.
Lint/DuplicateBranch:
  Exclude:
    - "tasks/**/*"
