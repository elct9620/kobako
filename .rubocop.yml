AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false


Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# E2E test files spin up servers and orchestrate multi-step assertions; the
# default Metrics cops fight that shape without improving the tests. Each
# entry below is the specific test class that exceeds the limit today —
# new tests are expected to stay inside the cop's defaults.
Metrics/ClassLength:
  Exclude:
    - "test/test_e2e_journeys.rb"
    - "test/catalog/test_handler.rb"
    - "test/transport/test_dispatcher.rb"
    - "test/test_namespace_binding.rb"
    - "test/test_codec.rb"
    - "test/transport/test_envelope.rb"
    # WireValueGenerator owns ten generation concerns (ints / floats /
    # strings / binary / arrays / maps / symbols / handles / exceptions /
    # scalar dispatch) sharing @rng and @coverage; splitting them into
    # mixins would scatter the band tables away from the methods that
    # consume them without improving readability.
    - "test/support/wire_value_generator.rb"

# Long E2E assertion bodies set up multi-step round-trip state; the
# AbcSize budget penalises that shape without improving the tests.
Metrics/AbcSize:
  Exclude:
    - "test/test_e2e_journeys.rb"
    - "test/transport/test_dispatcher.rb"

# MessagePack format names embed bit-width suffixes (int_8, fixarray_16, map_32)
# matching the SPEC wire-format vocabulary; renaming them to "int8" would lose
# the SPEC alignment and is rejected.
Naming/VariableNumber:
  Exclude:
    - "test/support/wire_value_generator.rb"

# `namespace :vendor` in tasks/vendor.rake iterates KobakoVendor::TARBALL_TOOLCHAINS
# and declares per-toolchain `file` / `setup:<name>` tasks via loops; the
# block still exceeds the default 25-line budget because every additional
# toolchain or per-artifact namespace expands the parent. Other .rake files
# (mruby/wasm/benchmark) fit the default after their per-task work moved
# into support classes — they are no longer exempt.
Metrics/BlockLength:
  Exclude:
    - "tasks/vendor.rake"
    - "*.gemspec"

Layout/LineLength:
  Exclude:
    - "*.gemspec"

# The `__kobako_run` dispatch wrapper in wasm/kobako-wasm/src/abi/dispatch_wrapper.rb
# reads three guest-side globals (`$__kobako_run_target__`, `_args__`,
# `_kwargs__`) that the host's `Instance#run` path stashes via mruby's
# C API before evaluating the wrapper. The names are part of the
# Rust ↔ mruby wire ABI; renaming them would break the dispatch flow.
# Listed by exact identifier so any other accidental global still gets
# flagged.
Style/GlobalVars:
  AllowedVariables:
    - $__kobako_run_target__
    - $__kobako_run_args__
    - $__kobako_run_kwargs__

# ruby/rbs upstream documents `class X < Data.define(...)` as the
# Steep-friendly form for typed Value Objects — the assignment form
# (`X = Data.define(...)`) leaves Data's auto-generated methods inside
# a `do ... end` block that Steep cannot see, forcing every type
# carrying validation logic to wrap its body in `# steep:ignore`.
# We pick Steep over Rubocop here; the only visible cost is one
# anonymous superclass entry in `.ancestors`.
# https://github.com/ruby/rbs/blob/master/docs/data_and_struct.md
Style/DataInheritance:
  Enabled: false
